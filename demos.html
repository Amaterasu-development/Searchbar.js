<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo searchbar.js</title>
    <link rel="stylesheet" href="styles/search.js-styles.css">
</head>
<body>
    <section class="searchView">
        <input type="text" data-filter="search" placeholder="search anything..."><br>
        <ul class="results"></ul>
    </section>
    <script src="scripts/search.js"></script>
    <script>
        let elementsForSearch = [
            {textElement: "Amazon", link: "index.html"},
            {textElement: "Microsoft", link: "demos.html"},
            {textElement: "M'n's", link: "index.html", isLinkExternal: true}
        ]
        setupSearchBar(elementsForSearch, "Aucun contenu correspondant à votre recherche.")
    </script>
</body>
</html>
